name: CI phase4-settlement-audit

on:
  push:
    branches: ["feat/phase4-settlement-audit", "main"]
  pull_request:
    branches: ["main", "feat/phase4-settlement-audit"]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: "npm"

      - name: Install Dependencies
        run: npm ci

      - name: Run Linter
        run: npm run lint
        continue-on-error: true

      - name: Build Application
        run: npm run build
